version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: edug-postgres
    environment:
      POSTGRES_USER: edug
      POSTGRES_PASSWORD: edug123
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: edug-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edug.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: